<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Covert Delivery – Secret Shop</title>
  <link rel="stylesheet" href="styles.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
</head>
<body class="page-body">

<nav class="navbar navbar-white">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="#1a1a2e"><path d="M20 7H4c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V9c0-1.1-.9-2-2-2zm0 12H4V9h16v10zM12 3c-1.7 0-3 1.3-3 3h2c0-.6.4-1 1-1s1 .4 1 1h2c0-1.7-1.3-3-3-3z"/></svg>
    </a>
    <div class="nav-links">
      <a href="index.html" class="nav-link">Home</a>
      <a href="catalog.html" class="nav-link">Gadget Repository</a>
    </div>
    <a href="cart.html" class="nav-cart" style="color:var(--text)">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M7 18c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm10 0c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zM7.8 14h8.4l1.5-8H5.2L4.3 2H1v2h2l3.6 10z"/></svg>
      <span class="cart-badge" id="cartCount">0</span>
    </a>
  </div>
</nav>

<div class="checkout-page">
  <div class="checkout-steps">
    <div class="checkout-step active">
      <div class="step-icon"><svg width="22" height="22" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z" fill="white"/></svg></div>
      <span class="step-label">Rendezvous Location</span>
    </div>
    <div class="checkout-step active">
      <div class="step-icon"><svg width="22" height="22" viewBox="0 0 24 24"><path d="M20 8h-3V4H3c-1.1 0-2 .9-2 2v11h2c0 1.66 1.34 3 3 3s3-1.34 3-3h6c0 1.66 1.34 3 3 3s3-1.34 3-3h2v-5l-3-4z" fill="white"/></svg></div>
      <span class="step-label">Covert Delivery</span>
    </div>
    <div class="checkout-step">
      <div class="step-icon"><svg width="22" height="22" viewBox="0 0 24 24"><path d="M20 4H4c-1.11 0-2 .89-2 2v12c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V6c0-1.11-.89-2-2-2zm0 14H4v-6h16v6zm0-10H4V6h16v2z" fill="#aaa"/></svg></div>
      <span class="step-label">Mission Funding</span>
    </div>
  </div>
  <div id="deliveryContent"></div>
</div>

<footer class="footer">
  <div class="footer-inner">
    <div class="footer-col"><h4>QUICK LINKS</h4><ul><li><a href="catalog.html">Gadget Repository</a></li></ul></div>
    <div class="footer-col"><h4>TOOLS</h4><ul><li><a href="#">Information</a></li></ul></div>
    <div class="footer-col"><h4>CONTACT</h4><ul><li><a href="#">✉ Email</a></li></ul></div>
  </div>
  <p class="footer-note">This site is for demonstration purposes only</p>
</footer>

<div class="toast" id="toast"></div>

<script src="api.js"></script>
<script>
  const cartBadge = document.getElementById('cartCount');
  let selectedShippingId = null;

  async function init() {
    const container = document.getElementById('deliveryContent');
    container.innerHTML = '<div class="loading"><div class="spinner"></div></div>';

    try {
      // Load checkout state from backend — it includes shippingOptions and pricing
      const co = await Api.checkout.get();
      cartBadge.textContent = (co.items||[]).reduce((s,i)=>s+(i.quantity||1),0);

      const subtotal = co.subtotal || 0;
      const tax      = co.tax || 0;
      const shipping = co.shipping || 0;
      const total    = co.total || (subtotal + tax + shipping);

      // shippingOptions: [{id, type, price, days}, ...]
      const opts = co.shippingOptions || co.shippingRates || [];
      if (opts.length > 0) selectedShippingId = opts[0].id || opts[0].type;

      const optionsHTML = opts.length > 0
        ? opts.map((o,i) => `
          <div class="shipping-option${i===0?' selected':''}" data-id="${escHtml(String(o.id||o.type))}" onclick="selectOption(this)">
            <div class="shipping-option-header">
              <span class="shipping-option-name">${escHtml(o.type||o.name||'Standard')}</span>
              <span class="shipping-option-price">$${Number(o.price||0).toLocaleString()}</span>
            </div>
            <div class="shipping-option-days">${escHtml(String(o.days||o.deliveryDays||''))}</div>
          </div>`).join('')
        : `<div class="shipping-option selected" data-id="standard">
            <div class="shipping-option-header">
              <span class="shipping-option-name">Standard</span>
              <span class="shipping-option-price">$0</span>
            </div>
            <div class="shipping-option-days">3 business days</div>
          </div>`;

      container.innerHTML = `
        <div class="warning-banner">
          <svg width="18" height="18" viewBox="0 0 24 24"><path d="M1 21h22L12 2 1 21zm12-3h-2v-2h2v2zm0-4h-2v-4h2v4z" fill="#c0a000"/></svg>
          <span>Warning — This site is for demonstration/educational purposes only, do not enter personal details</span>
        </div>
        <div class="checkout-body">
          <div class="checkout-form">
            <h2>Covert Delivery</h2>
            ${optionsHTML}
            <div class="form-actions">
              <a href="checkout.html" class="btn-back">Back to Cart</a>
              <button class="btn-next" id="continueBtn">Continue →</button>
            </div>
          </div>
          <div class="order-summary">
            <div class="order-summary-title">Amount due</div>
            <div class="order-summary-amount" id="summaryTotal">$${total.toLocaleString()}</div>
            <div class="summary-row"><span>Subtotal</span><span>$${subtotal.toLocaleString()}</span></div>
            <div class="summary-row"><span>Taxes</span><span>$${tax.toLocaleString()}</span></div>
            <div class="summary-total"><span>Total</span><span>$${total.toLocaleString()}</span></div>
          </div>
        </div>`;

      document.getElementById('continueBtn').addEventListener('click', async () => {
        const btn = document.getElementById('continueBtn');
        btn.disabled = true; btn.textContent = 'Saving…';
        try {
          await Api.checkout.update(selectedShippingId);
          window.location.href = 'checkout-payment.html';
        } catch(e) {
          showToast('Error: ' + e.message); btn.disabled = false; btn.textContent = 'Continue →';
        }
      });

    } catch(e) {
      container.innerHTML = `<div class="svc-unavailable">
        <svg class="svc-unavailable-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
        <h3>Checkout service unavailable</h3>
        <p>The checkout backend is not reachable. Start the checkout service to continue.</p>
        <button class="btn-retry" onclick="init()">Retry</button>
      </div>`;
    }
  }

  function selectOption(el) {
    document.querySelectorAll('.shipping-option').forEach(o => o.classList.remove('selected'));
    el.classList.add('selected');
    selectedShippingId = el.dataset.id;
  }

  function showToast(msg) {
    const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3500);
  }
  function escHtml(str) { return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  init();
</script>
</body>
</html>
