<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mission Funding – Secret Shop</title>
  <link rel="stylesheet" href="styles.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
</head>
<body class="page-body">

<nav class="navbar navbar-white">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="#1a1a2e"><path d="M20 7H4c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V9c0-1.1-.9-2-2-2zm0 12H4V9h16v10zM12 3c-1.7 0-3 1.3-3 3h2c0-.6.4-1 1-1s1 .4 1 1h2c0-1.7-1.3-3-3-3z"/></svg>
    </a>
    <div class="nav-links">
      <a href="index.html" class="nav-link">Home</a>
      <a href="catalog.html" class="nav-link">Gadget Repository</a>
    </div>
    <a href="cart.html" class="nav-cart" style="color:var(--text)">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M7 18c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm10 0c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zM7.8 14h8.4l1.5-8H5.2L4.3 2H1v2h2l3.6 10z"/></svg>
      <span class="cart-badge" id="cartCount">0</span>
    </a>
  </div>
</nav>

<div class="checkout-page">
  <div class="checkout-steps">
    <div class="checkout-step active">
      <div class="step-icon"><svg width="22" height="22" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z" fill="white"/></svg></div>
      <span class="step-label">Rendezvous Location</span>
    </div>
    <div class="checkout-step active">
      <div class="step-icon"><svg width="22" height="22" viewBox="0 0 24 24"><path d="M20 8h-3V4H3c-1.1 0-2 .9-2 2v11h2c0 1.66 1.34 3 3 3s3-1.34 3-3h6c0 1.66 1.34 3 3 3s3-1.34 3-3h2v-5l-3-4z" fill="white"/></svg></div>
      <span class="step-label">Covert Delivery</span>
    </div>
    <div class="checkout-step active">
      <div class="step-icon"><svg width="22" height="22" viewBox="0 0 24 24"><path d="M20 4H4c-1.11 0-2 .89-2 2v12c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V6c0-1.11-.89-2-2-2zm0 14H4v-6h16v6zm0-10H4V6h16v2z" fill="white"/></svg></div>
      <span class="step-label">Mission Funding</span>
    </div>
  </div>
  <div id="paymentContent"></div>
</div>

<footer class="footer">
  <div class="footer-inner">
    <div class="footer-col"><h4>QUICK LINKS</h4><ul><li><a href="catalog.html">Gadget Repository</a></li></ul></div>
    <div class="footer-col"><h4>TOOLS</h4><ul><li><a href="#">Information</a></li></ul></div>
    <div class="footer-col"><h4>CONTACT</h4><ul><li><a href="#">✉ Email</a></li></ul></div>
  </div>
  <p class="footer-note">This site is for demonstration purposes only</p>
</footer>

<div class="toast" id="toast"></div>

<script src="api.js"></script>
<script>
  const cartBadge = document.getElementById('cartCount');

  async function init() {
    const container = document.getElementById('paymentContent');
    container.innerHTML = '<div class="loading"><div class="spinner"></div></div>';

    try {
      const co = await Api.checkout.get();
      cartBadge.textContent = (co.items||[]).reduce((s,i)=>s+(i.quantity||1),0);

      const subtotal = co.subtotal || 0;
      const tax      = co.tax || 0;
      const shipping = co.shipping || 0;
      const total    = co.total || (subtotal + tax + shipping);

      container.innerHTML = `
        <div class="warning-banner">
          <svg width="18" height="18" viewBox="0 0 24 24"><path d="M1 21h22L12 2 1 21zm12-3h-2v-2h2v2zm0-4h-2v-4h2v4z" fill="#c0a000"/></svg>
          <span>Warning — This site is for demonstration/educational purposes only, do not enter personal details</span>
        </div>
        <div class="checkout-body">
          <div class="checkout-form">
            <h2>Mission Funding</h2>
            <div class="form-group"><label>Card Holder Name</label><input id="cardName" type="text" autocomplete="cc-name"/></div>
            <div class="form-group">
              <label>Card Number</label>
              <input id="cardNumber" type="text" autocomplete="cc-number" maxlength="19" placeholder="•••• •••• •••• ••••"/>
            </div>
            <div class="form-row">
              <div class="form-group"><label>Expiry Date</label><input id="expiry" type="text" autocomplete="cc-exp" placeholder="MM/YY" maxlength="5"/></div>
              <div class="form-group"><label>CVC/CVV</label><input id="cvv" type="text" autocomplete="cc-csc" maxlength="4" placeholder="•••"/></div>
            </div>
            <div class="form-actions">
              <a href="checkout-delivery.html" class="btn-back">Back to Cart</a>
              <button class="btn-next" id="purchaseBtn">Purchase →</button>
            </div>
          </div>
          <div class="order-summary">
            <div class="order-summary-title">Amount due</div>
            <div class="order-summary-amount">$${total.toLocaleString()}</div>
            <div class="summary-row"><span>Subtotal</span><span>$${subtotal.toLocaleString()}</span></div>
            <div class="summary-row"><span>Taxes</span><span>$${tax.toLocaleString()}</span></div>
            <div class="summary-row"><span>Shipping</span><span>$${shipping.toLocaleString()}</span></div>
            <div class="summary-total"><span>Total</span><span>$${total.toLocaleString()}</span></div>
          </div>
        </div>`;

      // Card number formatting
      document.getElementById('cardNumber').addEventListener('input', function() {
        this.value = this.value.replace(/\D/g,'').replace(/(.{4})/g,'$1 ').trim().substring(0,19);
      });
      document.getElementById('expiry').addEventListener('input', function() {
        this.value = this.value.replace(/\D/g,'').replace(/^(\d{2})(\d)/,'$1/$2').substring(0,5);
      });

      document.getElementById('purchaseBtn').addEventListener('click', async () => {
        const btn = document.getElementById('purchaseBtn');
        const name   = document.getElementById('cardName').value.trim();
        const number = document.getElementById('cardNumber').value.trim();
        const exp    = document.getElementById('expiry').value.trim();
        const cvv    = document.getElementById('cvv').value.trim();

        if (!name || !number || !exp || !cvv) {
          showToast('Please fill in all payment fields.'); return;
        }
        btn.disabled = true; btn.textContent = 'Processing…';

        try {
          // Submit to backend — backend handles payment
          // The Spring Boot CheckoutController.submit() accepts a payment payload
          const result = await Api.checkout.submit({
            cardName: name, cardNumber: number, expiry: exp, cvv
          });
          // result contains the order ID
          const orderId = result.orderId || result.id || result.checkoutId || '';
          sessionStorage.setItem('sss_last_order_id', orderId);
          window.location.href = 'order.html';
        } catch(e) {
          showToast('Payment error: ' + e.message); btn.disabled = false; btn.textContent = 'Purchase →';
        }
      });

    } catch(e) {
      container.innerHTML = `<div class="svc-unavailable">
        <svg class="svc-unavailable-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
        <h3>Checkout service unavailable</h3>
        <p>The checkout backend is not reachable. Start the checkout service to continue.</p>
        <button class="btn-retry" onclick="init()">Retry</button>
      </div>`;
    }
  }

  function showToast(msg) {
    const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3500);
  }

  init();
</script>
</body>
</html>
