<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gadget Repository – Secret Shop</title>
  <link rel="stylesheet" href="styles.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
</head>
<body class="page-body">

<nav class="navbar navbar-white">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="#1a1a2e"><path d="M20 7H4c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V9c0-1.1-.9-2-2-2zm0 12H4V9h16v10zM12 3c-1.7 0-3 1.3-3 3h2c0-.6.4-1 1-1s1 .4 1 1h2c0-1.7-1.3-3-3-3z"/></svg>
    </a>
    <div class="nav-links">
      <a href="index.html" class="nav-link">Home</a>
      <a href="catalog.html" class="nav-link active">Gadget Repository</a>
    </div>
    <a href="cart.html" class="nav-cart" style="color:var(--text)">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M7 18c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm10 0c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zM7.8 14h8.4l1.5-8H5.2L4.3 2H1v2h2l3.6 10z"/></svg>
      <span class="cart-badge" id="cartCount">0</span>
    </a>
  </div>
</nav>

<div class="catalog-layout">
  <!-- SIDEBAR: tags loaded from real API -->
  <aside class="catalog-sidebar">
    <p class="sidebar-title">CATEGORIES</p>
    <ul class="sidebar-nav" id="tagList">
      <li><a class="active" data-tag="">All Products</a></li>
      <!-- tags populated from /catalog/tags -->
    </ul>
  </aside>

  <main class="catalog-main">
    <p class="demo-notice">These products are for demonstration purposes only</p>
    <div id="catalogContent"></div>
  </main>
</div>

<footer class="footer">
  <div class="footer-inner">
    <div class="footer-col"><h4>QUICK LINKS</h4><ul><li><a href="catalog.html">Gadget Repository</a></li><li><a href="#">About</a></li></ul></div>
    <div class="footer-col"><h4>TOOLS</h4><ul><li><a href="#">Information</a></li><li><a href="#">Topology</a></li></ul></div>
    <div class="footer-col"><h4>CONTACT</h4><ul><li><a href="#">✉ Email</a></li><li><a href="#">📞 Phone</a></li></ul></div>
  </div>
  <p class="footer-note">This site is for demonstration purposes only</p>
</footer>

<div class="toast" id="toast"></div>

<script src="api.js"></script>
<script>
  let currentTag = '';
  const cartBadge = document.getElementById('cartCount');

  // ---- Cart count ----
  async function loadCartCount() {
    try {
      const cart = await Api.cart.get();
      cartBadge.textContent = (cart.items || []).reduce((s,i) => s + (i.quantity||1), 0);
    } catch { cartBadge.textContent = '0'; }
  }

  // ---- Tags sidebar ----
  async function loadTags() {
    try {
      const tags = await Api.catalog.getTags();
      // tags is an array of { id, name } OR array of strings
      const list = document.getElementById('tagList');
      (Array.isArray(tags) ? tags : []).forEach(t => {
        const name = typeof t === 'string' ? t : t.name;
        const val  = typeof t === 'string' ? t : (t.name || t.id);
        const li = document.createElement('li');
        li.innerHTML = `<a data-tag="${escHtml(val)}">${escHtml(name)}</a>`;
        list.appendChild(li);
      });
      list.querySelectorAll('a').forEach(a => {
        a.addEventListener('click', e => {
          e.preventDefault();
          list.querySelectorAll('a').forEach(x => x.classList.remove('active'));
          a.classList.add('active');
          currentTag = a.dataset.tag;
          loadProducts();
        });
      });
    } catch {
      // sidebar stays with just "All Products" if tags endpoint fails
    }
  }

  // ---- Products grid ----
  async function loadProducts() {
    const container = document.getElementById('catalogContent');
    container.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
    try {
      const params = currentTag ? { tag: currentTag } : {};
      const data = await Api.catalog.getProducts(params);
      const products = Array.isArray(data) ? data : (data.content || data.products || []);

      if (products.length === 0) {
        container.innerHTML = `<div class="svc-unavailable">
          <svg class="svc-unavailable-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
          <h3>No products found</h3>
          <p>No products available in this category.</p>
        </div>`;
        return;
      }

      const grid = document.createElement('div');
      grid.className = 'product-grid';
      products.forEach(p => {
        const imgSrc = p.imageUrl || `/assets/img/products/${p.id}.jpg`;
        const card = document.createElement('div');
        card.className = 'product-card';
        card.innerHTML = `
          <a href="detail.html?id=${p.id}">
            <div class="product-img-wrap">
              <img src="${imgSrc}" alt="${escHtml(p.name)}" onerror="this.src='/assets/img/products/${p.id}.jpg'"/>
            </div>
          </a>
          <div class="product-info">
            <h3 class="product-name"><a href="detail.html?id=${p.id}">${escHtml(p.name)}</a></h3>
            <div class="stars">☆☆☆☆☆</div>
            <p class="product-price">$${Number(p.price).toLocaleString()}</p>
            <button class="btn-add" data-id="${p.id}">＋ Add to Loadout</button>
          </div>`;
        grid.appendChild(card);
      });
      container.innerHTML = '';
      container.appendChild(grid);

      grid.querySelectorAll('.btn-add').forEach(btn => {
        btn.addEventListener('click', async () => {
          btn.disabled = true;
          try {
            await Api.cart.addItem(btn.dataset.id, 1);
            btn.textContent = '✓ Added!'; btn.style.background = '#27ae60';
            await loadCartCount();
            setTimeout(() => { btn.textContent = '＋ Add to Loadout'; btn.style.background = ''; btn.disabled = false; }, 1500);
          } catch(e) {
            showToast('Cart service error: ' + e.message); btn.disabled = false;
          }
        });
      });

    } catch(e) {
      container.innerHTML = `<div class="svc-unavailable">
        <svg class="svc-unavailable-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
        <h3>Catalog service unavailable</h3>
        <p>The catalog backend is not reachable. Start the catalog service to view products.</p>
        <button class="btn-retry" onclick="loadProducts()">Retry</button>
      </div>`;
    }
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3500);
  }
  function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  loadCartCount(); loadTags(); loadProducts();
</script>
</body>
</html>
